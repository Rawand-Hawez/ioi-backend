services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: skeleton_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: skeleton_dragonfly
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly_data:/data

  minio:
    image: minio/minio
    container_name: skeleton_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  gotrue:
    image: supabase/gotrue:v2.132.3
    container_name: skeleton_gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GOTRUE_PORT:-9999}:8081"
    environment:
      GOTRUE_DB_DRIVER: ${GOTRUE_DB_DRIVER}
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable&search_path=auth,public
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL}
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      # Required bare minimum GoTrue settings
      API_EXTERNAL_URL: http://localhost:${GOTRUE_PORT}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      # Set JWT role claim to 'authenticated' so PostgREST can switch roles
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated

  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: skeleton_postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT_REST:-3000}:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGREST_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # --- Fiber API (Custom Go Logic) ---
  # Uncomment for production / staging. For local dev, use `make dev` instead
  # which runs the Go binary on your host for fast iteration and debugger access.
  #
  # fiber:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.api
  #   container_name: skeleton_fiber
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "127.0.0.1:${API_PORT_FIBER:-8080}:8080"
  #   environment:
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: 5432
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #     POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
  #     GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
  #     GOTRUE_SITE_URL: ${GOTRUE_SITE_URL}
  #     DRAGONFLY_HOST: dragonfly
  #     DRAGONFLY_PORT: 6379
  #     DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD}
  #     CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  #     API_PORT_FIBER: 8080

volumes:
  pg_data:
  dragonfly_data:
  minio_data: